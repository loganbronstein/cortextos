name: CI

on:
  push:
    branches: [main, master, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build CLI
        run: npm run build

      - name: Verify CLI binary
        run: node dist/cli.js --help

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      CTX_INSTANCE_ID: ci-test
      CTX_ORG: testorg
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    env:
      AUTH_SECRET: ci-secret-for-build-only
      AUTH_TRUST_HOST: 'true'
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: cortextos
      CTX_INSTANCE_ID: ci-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Type check dashboard
        run: npx tsc --noEmit

      - name: Build dashboard
        run: npm run build
